// ToggleStockBrake — configuration
// Re-read every time you enter a flight scene (no game restart needed, just
// go back to the VAB/Space Center and re-enter). Living under PluginData,
// it does not touch the ModuleManager cache.

TOGGLESTOCKBRAKE
{
	enabled = true

	// Key (or combo) that toggles the stock "Brakes" action group — the same
	// effect as clicking the brake icon in the flight UI (status light
	// included). Format: optional modifiers separated by '+', followed by
	// the main key. Valid modifiers: Alt, Ctrl (or Control), Shift. The main
	// key name is a UnityEngine.KeyCode (e.g. Y, F5, Backspace, Mouse2,
	// Keypad0, ...). Valid examples: "Y", "Alt+Y", "Ctrl+Shift+Y".
	//
	// IMPORTANT: do NOT use whatever key you have bound to the stock
	// "Brakes" action as the main key here, even with a modifier (e.g.
	// "Alt+B" if B is your Brakes key — default it is). Check Settings >
	// Input > BRAKES for your current binding(s): the game unconditionally
	// forces the brake state to true on that physical key's KeyDown and to
	// false on its KeyUp, regardless of any modifier, making it impossible
	// to re-engage the brakes with the toggle. Y is unbound by default.
	key = Alt+Y
}
